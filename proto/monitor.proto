syntax = "proto3";
package monitor;

import "google/protobuf/timestamp.proto";

option go_package = "./pb";

service MetricsService {
  // Agent opens a stream and pushes metrics as they are collected
  rpc ReportMetrics(stream MetricPayload) returns (SummaryResponse);
}

message MetricPayload {
  string agent_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  double cpu_usage = 3;
  double mem_usage = 4;
}

message SummaryResponse {
  int32 reports_received = 1;
  string message = 2;
}
